services:
  postgres:
    image: postgres:16
    container_name: scbbank-postgres
    environment:
      POSTGRES_DB: scbbank
      POSTGRES_USER: scbbank
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scbbank -d scbbank"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: scbbank-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: scbbank-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: scbbank
      RABBITMQ_DEFAULT_PASS: scbbank
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  account-service:
    build:
      context: .
      dockerfile: account_service/Dockerfile
    image: scbbank/account-service:local
    env_file:
      - .env.runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"

  payment-service:
    build:
      context: .
      dockerfile: payment_service/Dockerfile
    image: scbbank/payment-service:local
    env_file:
      - .env.runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator-service:
        condition: service_started
    ports:
      - "8002:8000"

  orchestrator-service:
    build:
      context: .
      dockerfile: orchestrator_service/Dockerfile
    image: scbbank/orchestrator-service:local
    env_file:
      - .env.runtime
    depends_on:
      postgres:
        condition: service_healthy
      account-service:
        condition: service_started
      ledger-service:
        condition: service_started
    ports:
      - "8005:8000"

  ledger-service:
    build:
      context: .
      dockerfile: ledger_service/Dockerfile
    image: scbbank/ledger-service:local
    env_file:
      - .env.runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8003:8000"

  statement-service:
    build:
      context: .
      dockerfile: statement_service/Dockerfile
    image: scbbank/statement-service:local
    env_file:
      - .env.runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8004:8000"

  notification-service:
    build:
      context: .
      dockerfile: notification_service/Dockerfile
    image: scbbank/notification-service:local
    env_file:
      - .env.runtime
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8006:8000"

  metabase:
    image: metabase/metabase:latest
    container_name: scbbank-metabase
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db

volumes:
  postgres_data:
  metabase_data:
